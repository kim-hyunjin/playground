server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/notequiz}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production}
  access-expiry: ${JWT_ACCESS_EXPIRY:3600}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:2592000}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma4}
  timeout: ${OLLAMA_TIMEOUT:30}
  dummy-mode: ${OLLAMA_DUMMY_MODE:true}
