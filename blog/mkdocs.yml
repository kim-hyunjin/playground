site_name: hyunjin.log
site_description: Learn in public — multi-stack notes, side projects, and published blog posts.
site_author: kim-hyunjin
site_url: https://kim-hyunjin.github.io/playground/
docs_dir: content

exclude_docs: |
  **/*
  !index.md
  !**/*.pub.md
  !**/*.pub.ipynb
  !assets/**

theme:
  name: material
  language: ko
  custom_dir: overrides
  font:
    text: "Source Han Serif KR"
    code: "JetBrains Mono"
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: kami-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - roamlinks
  - awesome-pages:
      collapse_single_pages: true
  - mkdocs-jupyter:
      execute: false
      ignore: ["*.ipynb_checkpoints/*"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/kami.css
