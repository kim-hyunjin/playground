<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · Board</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #9aa8bc;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6f9;
        --surface: #ffffff;
        --border: #d8dee9;
        --text: #1a2332;
        --muted: #5c6b7f;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    .btn {
      display: inline-block;
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); text-decoration: none; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); text-decoration: none; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .card h2 { margin: 0 0 0.35rem; font-size: 1.05rem; }
    .meta { font-size: 0.8rem; color: var(--muted); }
    .content { white-space: pre-wrap; margin: 1rem 0; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.35rem; }
    input, textarea {
      width: 100%;
      padding: 0.5rem 0.65rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 8rem; resize: vertical; }
    .alert {
      padding: 0.65rem 0.9rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
      font-size: 0.875rem;
    }
    .empty { color: var(--muted); text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1><a href="/">Board</a></h1>
      <a class="btn btn-primary" href="/posts/new">글쓰기</a>
    </header>
    {{ body|safe }}
  </div>
</body>
</html>
